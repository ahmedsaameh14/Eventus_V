<section class="hero-section">
  <!-- Background Image -->
  <div class="hero-background">
    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80" alt="Eventus V Hero Background" class="hero-image" />
    <div class="hero-overlay"></div>
  </div>

  <!-- Hero Content -->
  <div class="hero-content">
    <h1 class="hero-title">
      <span class="hero-title-text">EVENTUS</span>
      <span class="hero-title-letter">V</span>
    </h1>
  </div>

  <!-- Social Media Sidebar -->
  <div class="social-sidebar">
    <a *ngFor="let link of socialLinks; let i = index"
       [href]="link.url"
       target="_blank"
       rel="noopener noreferrer"
       [attr.aria-label]="link.name"
       class="social-link"
       [style.animation-delay.ms]="i * 200">
      <i [class]="'bi bi-' + link.icon"></i>
    </a>
  </div>
</section>

<section class="who-we-are-section py-5">
  <div class="container">
    <div class="row align-items-center g-4">
      <div class="col-lg-6">
        <div class="who-card p-4 p-md-5">
          <div class="who-label">About Eventus V</div>
          <h2 class="who-title">Who We Are</h2>
          <p class="who-description">
            We’re a startup based in Cairo. We’re known for delivering integrated solutions for your exhibition and event needs.
          </p>
          
          <a routerLink="/about" class="btn who-button">Learn More</a>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="who-image-frame">
          <img src="https://images.unsplash.com/photo-1504384308090-c894fdcc538d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" alt="Event planning team" class="who-image" />
        </div>
      </div>
    </div>
  </div>
</section>
